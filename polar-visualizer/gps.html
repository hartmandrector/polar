<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1400" />
  <title>GPS Flight Viewer — Polar Visualizer</title>
  <link rel="stylesheet" href="/src/gps-viewer/gps-style.css" />
</head>
<body>
  <div id="gps-app">
    <!-- Drop zone (shown before file load) -->
    <div id="drop-zone">
      <div class="drop-content">
        <div class="drop-icon">📡</div>
        <h1>GPS Flight Viewer</h1>
        <p>Drop a FlySight TRACK.CSV file here</p>
        <p class="drop-hint">Or click to browse</p>
        <input type="file" id="file-input" accept=".csv,.CSV" />
      </div>
    </div>

    <!-- Main viewer (shown after file load) -->
    <div id="viewer-layout" class="hidden">
      <!-- Left: dual 3D scenes (side by side) -->
      <div id="scene-panel">
        <div id="dual-scene-container">
          <div class="scene-box" id="inertial-box">
            <div class="scene-label">Inertial Frame</div>
            <canvas id="inertial-canvas"></canvas>
          </div>
          <div class="scene-box" id="body-box">
            <div class="scene-label">Body Frame</div>
            <canvas id="body-canvas"></canvas>
          </div>
        </div>
        <!-- Transport bar -->
        <div id="transport">
          <button id="btn-play" title="Play/Pause">▶</button>
          <input type="range" id="scrubber" min="0" max="1000" value="0" />
          <span id="time-display">0:00.0 / 0:00.0</span>
          <select id="speed-select">
            <option value="0.25">0.25×</option>
            <option value="0.5">0.5×</option>
            <option value="1" selected>1×</option>
            <option value="2">2×</option>
            <option value="4">4×</option>
          </select>
          <button id="btn-load-new" title="Load new file">📂</button>
        </div>
        <!-- Keyframe timeline (diamonds on a thin track below scrubber) -->
        <div id="kf-timeline" style="height:12px;position:relative;margin:0 60px 0 36px;display:none;">
          <div style="position:absolute;top:5px;left:0;right:0;height:2px;background:#2a3040;border-radius:1px;"></div>
          <!-- Keyframe markers are injected dynamically -->
        </div>
      </div>

      <!-- Right: charts + readout -->
      <div id="charts-panel">
        <div id="flight-info"></div>

        <div class="chart-row">
          <div class="chart-container">
            <div class="chart-header">
              <select id="chart1-select">
                <option value="polar">Polar Curve (CL vs CD)</option>
                <option value="speed">Speed Polar (Vxs vs Vys)</option>
                <option value="ld">L/D vs Airspeed</option>
              </select>
            </div>
            <canvas id="chart1"></canvas>
          </div>
        </div>

        <div class="chart-row">
          <div class="chart-container">
            <div class="chart-header">
              <select id="chart2-select">
                <option value="altitude">Altitude</option>
                <option value="airspeed">Airspeed</option>
                <option value="aoa">Angle of Attack</option>
                <option value="gamma">Flight Path Angle (γ)</option>
                <option value="theta">Pitch (θ)</option>
                <option value="psi">Heading (ψ)</option>
                <option value="klkd">kL / kD</option>
                <option value="clcd">CL / CD</option>
                <option value="roll">Bank Angle (φ)</option>
                <option value="bodyrates">Body Rates (p, q, r)</option>
                <option value="angaccel">Angular Accel (ṗ, q̇, ṙ)</option>
                <option value="controls">Control Inputs (solved)</option>
                <option value="eulerrates">Euler Rates (φ̇, θ̇, ψ̇)</option>
                <option value="mode">Flight Mode</option>
              </select>
            </div>
            <canvas id="chart2"></canvas>
          </div>
        </div>

        <div class="chart-row">
          <div class="chart-container">
            <div class="chart-header">
              <select id="chart3-select">
                <option value="position">Ground Track (N vs E)</option>
                <option value="profile">Profile (distance vs altitude)</option>
              </select>
            </div>
            <canvas id="chart3"></canvas>
          </div>
        </div>

        <div class="chart-row">
          <div class="chart-container" id="readout-panel">
            <div class="chart-header"><span>Flight Data</span></div>
            <div id="readout"></div>
          </div>
        </div>

        <div class="chart-row">
          <div class="chart-container" id="moment-panel">
            <div class="chart-header"><span>Moment Decomposition</span></div>
            <div id="moment-container"></div>
          </div>
        </div>

        <div class="chart-row">
          <div class="chart-container" id="capture-panel">
            <div class="chart-header"><span>PNG Capture</span></div>
            <div id="capture-controls" style="padding: 8px 12px;">
              <!-- Canopy estimator controls -->
              <div style="margin-bottom:8px;">
                <label style="font-size:11px;color:#8090a0;display:block;margin-bottom:3px;">
                  Trim Offset: <span id="trim-offset-value">10.0</span>°
                </label>
                <input type="range" id="trim-offset-slider" min="-1" max="25" step="0.5" value="10.0"
                  style="width:100%;accent-color:#e94560;">
              </div>
              <div style="margin-bottom:8px;">
                <label style="font-size:11px;color:#8090a0;display:block;margin-bottom:3px;">Roll Method</label>
                <select id="roll-method-select" style="width:100%;padding:4px;background:#1a1e2e;color:#d0d8e0;border:1px solid #2a3040;border-radius:3px;font-size:12px;">
                  <option value="aero">Aero</option>
                  <option value="coordinated">Coordinated</option>
                  <option value="full">Full</option>
                  <option value="blended" selected>Blended</option>
                </select>
              </div>
              <div style="margin-bottom:8px;">
                <label style="font-size:11px;color:#8090a0;cursor:pointer;">
                  <input type="checkbox" id="overlay-toggle" checked style="accent-color:#e94560;vertical-align:middle;">
                  Display data overlays
                </label>
              </div>
              <div style="margin-bottom:8px;">
                <label style="font-size:12px;color:#d0d8e0;cursor:pointer;">
                  <input type="checkbox" id="control-solver-toggle" checked style="accent-color:#e94560;vertical-align:middle;">
                  Control Solver
                </label>
              </div>
              <div style="margin-bottom:8px;">
                <label style="font-size:11px;color:#8090a0;display:block;margin-bottom:3px;">Axis Helpers</label>
                <select id="axis-helper-mode" style="width:100%;padding:4px;background:#1a1e2e;color:#d0d8e0;border:1px solid #2a3040;border-radius:3px;font-size:12px;">
                  <option value="none">None</option>
                  <option value="frame" selected>Frame</option>
                  <option value="all">All</option>
                </select>
              </div>
              <button id="capture-btn" style="width:100%;padding:6px 12px;background:#e94560;color:#fff;border:none;border-radius:4px;cursor:pointer;font-weight:600;font-size:13px;">Capture PNG Sequence</button>
              <div style="margin-top:6px;font-size:11px;color:#8090a0;">
                <span>Status: </span><span id="capture-status">Ready</span>
              </div>
              <div style="font-size:11px;color:#8090a0;">
                <span>Frame: </span><span id="capture-frame">—</span>
              </div>

              <!-- Keyframe controls -->
              <div style="margin-top:12px;border-top:1px solid #2a3040;padding-top:8px;">
                <label style="font-size:12px;color:#c0c8d0;font-weight:600;display:block;margin-bottom:6px;">
                  <input type="checkbox" id="kf-enabled" style="accent-color:#e94560;vertical-align:middle;">
                  Keyframe Mode
                </label>
                <div style="display:flex;gap:4px;margin-bottom:6px;">
                  <button id="kf-add-inertial" style="flex:1;padding:4px 6px;background:#2a5090;color:#fff;border:none;border-radius:3px;cursor:pointer;font-size:10px;" title="Add keyframe at current time for inertial camera">+ Inertial</button>
                  <button id="kf-add-body" style="flex:1;padding:4px 6px;background:#2a5090;color:#fff;border:none;border-radius:3px;cursor:pointer;font-size:10px;" title="Add keyframe at current time for body camera">+ Body</button>
                </div>
                <div style="display:flex;gap:4px;margin-bottom:6px;">
                  <button id="kf-delete" style="flex:1;padding:4px 6px;background:#703030;color:#fff;border:none;border-radius:3px;cursor:pointer;font-size:10px;" title="Delete nearest keyframe at current time">Delete</button>
                  <button id="kf-clear" style="flex:1;padding:4px 6px;background:#403030;color:#ccc;border:none;border-radius:3px;cursor:pointer;font-size:10px;" title="Clear all keyframes">Clear</button>
                </div>
                <div style="display:flex;gap:4px;margin-bottom:6px;">
                  <button id="kf-save" style="flex:1;padding:4px 6px;background:#1a3a1a;color:#8c8;border:none;border-radius:3px;cursor:pointer;font-size:10px;">Save JSON</button>
                  <button id="kf-load-btn" style="flex:1;padding:4px 6px;background:#1a3a1a;color:#8c8;border:none;border-radius:3px;cursor:pointer;font-size:10px;">Load JSON</button>
                  <input type="file" id="kf-load-input" accept=".json" style="display:none">
                </div>
                <div style="display:flex;gap:4px;margin-bottom:6px;">
                  <button id="kf-set-start" style="flex:1;padding:4px 6px;background:#2a4060;color:#8cf;border:none;border-radius:3px;cursor:pointer;font-size:10px;" title="Set capture start at current time">Set Start</button>
                  <button id="kf-set-end" style="flex:1;padding:4px 6px;background:#2a4060;color:#8cf;border:none;border-radius:3px;cursor:pointer;font-size:10px;" title="Set capture end at current time">Set End</button>
                  <button id="kf-clear-range" style="padding:4px 6px;background:#403030;color:#ccc;border:none;border-radius:3px;cursor:pointer;font-size:10px;" title="Clear capture range">✕</button>
                </div>
                <div style="font-size:10px;color:#6a7a8a;" id="kf-status">No keyframes</div>
              </div>
            </div>
          </div>
        </div>

        <div class="chart-row">
          <div class="chart-container" id="head-sensor-panel">
            <div class="chart-header"><span>Head Sensor</span></div>
            <div id="head-sensor-controls" style="padding: 8px 12px;">
              <button id="head-sensor-btn" style="width:100%;padding:6px 12px;background:#2196f3;color:#fff;border:none;border-radius:4px;cursor:pointer;font-weight:600;font-size:13px;">Load Fused CSV</button>
              <input type="file" id="head-sensor-input" accept=".csv" style="display:none">
              <div style="margin-top:6px;font-size:11px;color:#8090a0;">
                <span id="head-sensor-status">No data</span>
              </div>
              <div style="margin-top:4px;">
                <label style="font-size:11px;color:#8090a0;">
                  Time offset (s): <input id="head-time-offset" type="number" value="0" step="0.1" style="width:60px;background:#1a1a2e;color:#e0e0e0;border:1px solid #334;border-radius:3px;padding:2px 4px;font-size:11px;">
                </label>
              </div>

              <!-- Camera Head Position -->
              <div style="margin-top:10px;border-top:1px solid #334;padding-top:8px;">
                <button id="camera-head-btn" style="width:100%;padding:6px 12px;background:#ff9800;color:#fff;border:none;border-radius:4px;cursor:pointer;font-weight:600;font-size:13px;">Load Camera Head Position</button>
                <input type="file" id="camera-head-input" accept=".csv" style="display:none">
                <div style="margin-top:6px;font-size:11px;color:#8090a0;">
                  <span id="camera-head-status">No camera data</span>
                </div>

                <!-- Camera Mount Offset -->
                <div id="camera-mount-controls" style="margin-top:6px;display:none;">
                  <div style="font-size:11px;color:#9aa;font-weight:600;margin-bottom:4px;">Camera Mount Offset</div>
                  <div style="display:flex;flex-direction:column;gap:3px;">
                    <label style="font-size:11px;color:#8090a0;display:flex;align-items:center;gap:4px;">
                      Heading: <input id="cam-offset-heading" type="number" value="0" step="1" style="width:55px;background:#1a1a2e;color:#e0e0e0;border:1px solid #334;border-radius:3px;padding:2px 4px;font-size:11px;"> °
                    </label>
                    <label style="font-size:11px;color:#8090a0;display:flex;align-items:center;gap:4px;">
                      Pitch: <input id="cam-offset-pitch" type="number" value="-20" step="1" style="width:55px;background:#1a1a2e;color:#e0e0e0;border:1px solid #334;border-radius:3px;padding:2px 4px;font-size:11px;"> °
                    </label>
                    <label style="font-size:11px;color:#8090a0;display:flex;align-items:center;gap:4px;">
                      Roll: <input id="cam-offset-roll" type="number" value="0" step="1" style="width:55px;background:#1a1a2e;color:#e0e0e0;border:1px solid #334;border-radius:3px;padding:2px 4px;font-size:11px;"> °
                    </label>
                  </div>
                  <div style="font-size:11px;color:#8090a0;margin-top:4px;">
                    <label>Sync offset (ms): <input id="cam-sync-offset" type="number" value="0" step="50" style="width:80px;background:#1a1a2e;color:#e0e0e0;border:1px solid #334;border-radius:3px;padding:2px 4px;font-size:11px;"></label>
                  </div>
                  <div style="font-size:11px;color:#8090a0;margin-top:4px;">
                    <label>Gyroflow CSV path: <input id="cam-gyroflow-path" type="text" placeholder="(set on save for auto-load)" style="width:100%;box-sizing:border-box;background:#1a1a2e;color:#e0e0e0;border:1px solid #334;border-radius:3px;padding:2px 4px;font-size:10px;margin-top:2px;"></label>
                  </div>
                </div>

                <!-- Save / Load Config -->
                <div style="margin-top:6px;display:flex;gap:4px;">
                  <button id="camera-config-save" style="flex:1;padding:4px 8px;background:#2e4a2e;color:#adc;border:none;border-radius:3px;cursor:pointer;font-size:11px;">Save Config</button>
                  <button id="camera-config-load" style="flex:1;padding:4px 8px;background:#2e3a4a;color:#acd;border:none;border-radius:3px;cursor:pointer;font-size:11px;">Load Config</button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="/src/gps-viewer/gps-main.ts"></script>
</body>
</html>
